<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini API Test</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #1a1a1a;
            color: #fff;
        }

        h1 {
            color: #7c3aed;
        }

        .input-group {
            margin: 20px 0;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        input,
        textarea {
            width: 100%;
            padding: 12px;
            background: #2a2a2a;
            border: 2px solid #444;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            font-family: monospace;
        }

        button {
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            margin-right: 10px;
        }

        button:hover {
            opacity: 0.9;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #result {
            margin-top: 20px;
            padding: 20px;
            background: #2a2a2a;
            border-radius: 8px;
            border-left: 4px solid #7c3aed;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 13px;
            max-height: 500px;
            overflow-y: auto;
        }

        .success {
            border-left-color: #10b981;
        }

        .error {
            border-left-color: #ef4444;
        }

        .loading {
            opacity: 0.6;
        }
    </style>
</head>

<body>
    <h1>🔧 Gemini API Tester</h1>
    <p>Use this tool to test your Gemini API key directly</p>

    <div class="input-group">
        <label for="apiKey">API Key:</label>
        <input type="text" id="apiKey" placeholder="AIzaSy..." value="AIzaSyCm28PcXa6EAp_pWpNaRg76PgTMDdNNoHo">
    </div>

    <div class="input-group">
        <label for="model">Model Name:</label>
        <input type="text" id="model" placeholder="gemini-1.5-flash" value="gemini-1.5-flash">
    </div>

    <div class="input-group">
        <label for="prompt">Test Prompt:</label>
        <textarea id="prompt" rows="3">Say "Hello, I'm working!" if you can hear me.</textarea>
    </div>

    <button onclick="testAPI()">Test API</button>
    <button onclick="listModels()">List Available Models</button>
    <button onclick="clearResult()">Clear</button>

    <div id="result"></div>

    <script type="module">
        import { GoogleGenerativeAI } from 'https://esm.run/@google/generative-ai';

        window.testAPI = async function () {
            const apiKey = document.getElementById('apiKey').value.trim();
            const modelName = document.getElementById('model').value.trim();
            const prompt = document.getElementById('prompt').value.trim();
            const resultDiv = document.getElementById('result');

            if (!apiKey) {
                resultDiv.className = 'error';
                resultDiv.textContent = '❌ Please enter an API key';
                return;
            }

            resultDiv.className = 'loading';
            resultDiv.textContent = '⏳ Testing API...\n\nModel: ' + modelName + '\nPrompt: ' + prompt;

            try {
                const genAI = new GoogleGenerativeAI(apiKey);
                const model = genAI.getGenerativeModel({ model: modelName });

                console.log('Sending request...');
                const result = await model.generateContent(prompt);
                const response = await result.response;
                const text = response.text();

                resultDiv.className = 'success';
                resultDiv.textContent = `✅ SUCCESS!\n\nModel: ${modelName}\n\nResponse:\n${text}\n\n✨ Your API key is working!`;
                console.log('Success!', text);

            } catch (error) {
                resultDiv.className = 'error';
                resultDiv.textContent = `❌ ERROR\n\nModel: ${modelName}\n\nError Message:\n${error.message}\n\nError Details:\n${JSON.stringify(error, null, 2)}\n\n💡 Suggestions:\n`;

                if (error.message.includes('404')) {
                    resultDiv.textContent += '- Model not found. Try: gemini-1.5-flash or gemini-pro\n';
                } else if (error.message.includes('403')) {
                    resultDiv.textContent += '- Permission denied. Check if API is enabled in Google Cloud Console\n';
                } else if (error.message.includes('400')) {
                    resultDiv.textContent += '- Invalid API key. Verify your key is correct\n';
                } else if (error.message.includes('429')) {
                    resultDiv.textContent += '- Rate limit exceeded. Wait 60 seconds and try again\n';
                }

                console.error('Error:', error);
            }
        }

        window.listModels = async function () {
            const apiKey = document.getElementById('apiKey').value.trim();
            const resultDiv = document.getElementById('result');

            if (!apiKey) {
                resultDiv.className = 'error';
                resultDiv.textContent = '❌ Please enter an API key';
                return;
            }

            resultDiv.className = 'loading';
            resultDiv.textContent = '⏳ Fetching available models...';

            try {
                const response = await fetch(
                    `https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`
                );

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();

                resultDiv.className = 'success';
                resultDiv.textContent = `✅ Available Models:\n\n`;

                if (data.models && data.models.length > 0) {
                    data.models.forEach(model => {
                        resultDiv.textContent += `📦 ${model.name}\n`;
                        if (model.displayName) {
                            resultDiv.textContent += `   Display: ${model.displayName}\n`;
                        }
                        if (model.supportedGenerationMethods) {
                            resultDiv.textContent += `   Methods: ${model.supportedGenerationMethods.join(', ')}\n`;
                        }
                        resultDiv.textContent += '\n';
                    });
                } else {
                    resultDiv.textContent += 'No models found.';
                }

            } catch (error) {
                resultDiv.className = 'error';
                resultDiv.textContent = `❌ ERROR\n\n${error.message}\n\n${JSON.stringify(error, null, 2)}`;
                console.error('Error:', error);
            }
        }

        window.clearResult = function () {
            document.getElementById('result').textContent = '';
            document.getElementById('result').className = '';
        }
    </script>
</body>

</html>
